# Shared service definitions — extended by compose.cuda.yml and compose.rocm.yml

services:
  db:
    image: postgres:17
    env_file: ../.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    env_file: ../.env
    environment:
      # Allows the backend container to reach vLLM containers whose ports are
      # published on the Docker host. Without this, 'localhost' inside the
      # backend container resolves to the container itself, not the host.
      VLLM_HOST: host.docker.internal
    # Map the Docker host gateway so host.docker.internal resolves on Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3000:3000"

volumes:
  pgdata:
  hf_cache:
