# AMD ROCm GPU stack
#
# Usage (run from the project root):
#   # Serve one model:
#   docker compose -f docker/compose.rocm.yml --env-file .env --profile vllm-1 up --build
#
#   # Serve two models:
#   docker compose -f docker/compose.rocm.yml --env-file .env --profile vllm-1 --profile vllm-2 up --build
#
# Required .env variables:
#   VLLM_MODEL_1, VLLM_MODEL_2, ... (HuggingFace model IDs)
#   HF_TOKEN (for gated models)
#
# First run downloads model weights into the hf_cache volume.
# Subsequent runs reuse the cache — no re-download.
#
# Image: https://hub.docker.com/r/vllm/vllm-openai-rocm/tags
# Docs:  https://docs.vllm.ai/en/v0.4.1/getting_started/amd-installation.html

include:
  - path: compose.base.yml
    env_file: ../.env

x-vllm-common: &vllm-common
  image: ${VLLM_ROCM_IMAGE:-vllm/vllm-openai-rocm:latest}
  ipc: host
  devices:
    - /dev/kfd
    - /dev/dri
  group_add:
    - video
    - render
  device_cgroup_rules:
    # Allow access to all DRI character devices (major 226)
    - 'c 226:* rmw'
  cap_add:
    - SYS_PTRACE
  security_opt:
    - seccomp=unconfined
  volumes:
    - hf_cache:/root/.cache/huggingface
  restart: unless-stopped

services:
  # --- vLLM model slots (activate via --profile) ---

  vllm-1:
    <<: *vllm-common
    profiles: [vllm-1]
    command:
      - --model
      - ${VLLM_MODEL_1}
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --enforce-eager
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
    ports:
      - "${VLLM_PORT_1:-8081}:8080"

  vllm-2:
    <<: *vllm-common
    profiles: [vllm-2]
    command:
      - --model
      - ${VLLM_MODEL_2}
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --enforce-eager
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
    ports:
      - "${VLLM_PORT_2:-8082}:8080"

  vllm-3:
    <<: *vllm-common
    profiles: [vllm-3]
    command:
      - --model
      - ${VLLM_MODEL_3}
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --enforce-eager
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
    ports:
      - "${VLLM_PORT_3:-8083}:8080"

  vllm-4:
    <<: *vllm-common
    profiles: [vllm-4]
    command:
      - --model
      - ${VLLM_MODEL_4}
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --enforce-eager
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
    ports:
      - "${VLLM_PORT_4:-8084}:8080"
